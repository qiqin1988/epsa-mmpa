<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Pemantauan EPSA MMPA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#edf2f7;

}

.header{

background:#0B5ED7;
color:white;
padding:20px 40px;

display:flex;
justify-content:space-between;
align-items:center;

box-shadow:0 5px 20px rgba(0,0,0,.15);

}

.header h1{

font-size:28px;

}

.header small{

opacity:.8;

}

.container{

padding:25px;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:25px;

}

.card{

background:white;

padding:25px;

border-radius:18px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

transition:.3s;

}

.card:hover{

transform:translateY(-5px);

}

.card i{

font-size:30px;

color:#0B5ED7;

margin-bottom:10px;

}

.card h2{

font-size:34px;

margin-top:10px;

}

.card p{

color:#666;

}

</style>

</head>

<body>

<div class="header">

<div>

<h1>Dashboard Pemantauan EPSA MMPA</h1>

<small>Hospital Pulau Pinang</small>

</div>

<div>

<small id="lastUpdate">

Kemaskini :

-

</small>

</div>

</div>

<div class="container">

<div class="cards">

<div class="card">

<i class="fa-solid fa-users"></i>

<p>Jumlah Pegawai</p>

<h2 id="jumlah">0</h2>

</div>

<div class="card">

<i class="fa-solid fa-circle-check"></i>

<p>Lengkap</p>

<h2 id="lengkap">0</h2>

</div>

<div class="card">

<i class="fa-solid fa-circle-xmark"></i>

<p>Belum Lengkap</p>

<h2 id="belum">0</h2>

</div>

<div class="card">

<i class="fa-solid fa-chart-line"></i>

<p>Peratus Siap</p>

<h2 id="peratus">0%</h2>

</div>

</div>
