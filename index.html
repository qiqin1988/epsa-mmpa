<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Pemantauan EPSA MMPA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#edf2f7;

}

.header{

background:#0B5ED7;
color:white;
padding:20px 40px;

display:flex;
justify-content:space-between;
align-items:center;

box-shadow:0 5px 20px rgba(0,0,0,.15);

}

.header h1{

font-size:28px;

}

.header small{

opacity:.8;

}

.container{

padding:25px;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:25px;

}

.card{

background:white;

padding:25px;

border-radius:18px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

transition:.3s;

}

.card:hover{

transform:translateY(-5px);

}

.card i{

font-size:30px;

color:#0B5ED7;

margin-bottom:10px;

}

.card h2{

font-size:34px;

margin-top:10px;

}

.card p{

color:#666;

}

</style>

</head>

<body>

<div class="header">

<div>

<h1>Dashboard Pemantauan EPSA MMPA</h1>

<small>Hospital Pulau Pinang</small>

</div>

<div>

<small id="lastUpdate">

Kemaskini :

-

</small>

</div>

</div>

<div class="container">

<div class="cards">

<div class="card">

<i class="fa-solid fa-users"></i>

<p>Jumlah Pegawai</p>

<h2 id="jumlah">0</h2>

</div>

<div class="card">

<i class="fa-solid fa-circle-check"></i>

<p>Lengkap</p>

<h2 id="lengkap">0</h2>

</div>

<div class="card">

<i class="fa-solid fa-circle-xmark"></i>

<p>Belum Lengkap</p>

<h2 id="belum">0</h2>

</div>

<div class="card">

<i class="fa-solid fa-chart-line"></i>

<p>Peratus Siap</p>

<h2 id="peratus">0%</h2>

</div>

</div>

<h2 style="margin-bottom:15px;">Ringkasan Mengikut Jabatan</h2>

<div id="departmentCards"
style="
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
margin-bottom:30px;
">

</div>
    
<h2 style="margin-bottom:15px;">Senarai Pegawai</h2>

<table style="width:100%;background:white;border-collapse:collapse;box-shadow:0 5px 15px rgba(0,0,0,.08);">

<thead>

<tr style="background:#0B5ED7;color:white;">

<th style="padding:12px;">Nama</th>
<th>Jawatan</th>
<th>Jabatan</th>
<th>Status</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycby18A9luLxRnX0yWmvVKRlz_wwgHff-BcoeQeDcbeNXvD5zGRKWbI2xpa2fhPlmGsaKAg/exec";
let allData = [];
fetch(API_URL,{
    method:"GET"
})
.then(response=>response.json())
.then(data=>{

    const unique=[];
    const seen=new Set();
    const jabatanCount = {};

    data.forEach(item=>{

        const key = String(item.ic)
    .replace(/-/g,"")
    .replace(/\s/g,"")
    .trim();

        if(!seen.has(key)){

            seen.add(key);

            unique.push(item);

        }

    });
 allData = unique;

    let jumlahLengkap=0;

    let html="";

    unique.forEach(item=>{

        const status=item.sijil ? "Lengkap":"Belum";
        const jabatan = item.jabatan || "TIADA JABATAN";

jabatanCount[jabatan] = (jabatanCount[jabatan] || 0) + 1;

        if(status==="Lengkap") jumlahLengkap++;

        html+=`
        <tr>
            <td style="padding:10px">${item.nama}</td>
            <td>${item.jawatan}</td>
            <td>${item.jabatan}</td>
            <td style="color:${status==="Lengkap"?"green":"red"}">${status}</td>
        </tr>
        `;

    });
let cardHTML = "";

Object.entries(jabatanCount)
.sort((a,b)=>b[1]-a[1])
.forEach(([jabatan,bil])=>{

cardHTML += `
<div class="dept-card"
data-jabatan="${jabatan}"
style="
background:white;
border-radius:16px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
cursor:pointer;
transition:.3s;
border-left:6px solid #0B5ED7;
">

<h3 style="margin-bottom:10px;">🏥 ${jabatan}</h3>

<p style="font-size:28px;font-weight:bold;color:#0B5ED7;">
👥 ${bil}
</p>

<small>Klik untuk lihat senarai pegawai</small>

</div>
`;

});

document.getElementById("departmentCards").innerHTML = cardHTML;
   document.querySelectorAll(".dept-card").forEach(card => {

    card.addEventListener("click", () => {

        showDepartment(card.dataset.jabatan);

    });

});

document.getElementById("tableBody").innerHTML = html;

document.getElementById("jumlah").textContent = unique.length;

document.getElementById("lengkap").textContent = jumlahLengkap;

document.getElementById("belum").textContent = unique.length - jumlahLengkap;

document.getElementById("peratus").textContent =
((jumlahLengkap/unique.length)*100).toFixed(1)+"%";

document.getElementById("lastUpdate").textContent =
"Kemaskini : " + new Date().toLocaleString("ms-MY");
    


    
    }) 
    
.catch(error=>{

    console.error(error);

    alert(error);

});
 function showDepartment(jabatan){

    let html = "";

    const filtered = allData.filter(item => item.jabatan === jabatan);

    filtered.forEach(item=>{

        const status = item.sijil ? "Lengkap" : "Belum";

        html += `
        <tr>
            <td style="padding:10px">${item.nama}</td>
            <td>${item.jawatan}</td>
            <td>${item.jabatan}</td>
            <td style="color:${status==="Lengkap"?"green":"red"};font-weight:bold;">
                ${status}
            </td>
        </tr>
        `;

    });

    document.getElementById("tableBody").innerHTML = html;

}

  </script>

</body>

</html>
