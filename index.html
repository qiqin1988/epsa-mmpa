<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Pemantauan EPSA MMPA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#edf2f7;

}

.header{

background:#0B5ED7;
color:white;
padding:20px 40px;

display:flex;
justify-content:space-between;
align-items:center;

box-shadow:0 5px 20px rgba(0,0,0,.15);

}

.header h1{

font-size:28px;

}

.header small{

opacity:.8;

}

.container{

padding:25px;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:25px;

}

.card{

background:white;

padding:25px;

border-radius:18px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

transition:.3s;

}

.card:hover{

transform:translateY(-5px);

}
    .dept-card:hover{

transform:translateY(-6px) scale(1.02);

box-shadow:0 18px 35px rgba(11,94,215,.18);

}

.dept-card::before{

content:"";

position:absolute;

top:0;

left:0;

width:100%;

height:5px;

background:linear-gradient(90deg,#0B5ED7,#5aa9ff);

}

.card i{

font-size:30px;

color:#0B5ED7;

margin-bottom:10px;

}

.card h2{

font-size:34px;

margin-top:10px;

}

.card p{

color:#666;

}

</style>

</head>

<body>

<div class="header">

<div>

<h1>Dashboard Pemantauan EPSA MMPA</h1>

<small>Hospital Pulau Pinang</small>

</div>

<div>

<small id="lastUpdate">

Kemaskini :

-

</small>

</div>

</div>

<div class="container">

<div class="cards">

<div class="card">

<i class="fa-solid fa-users"></i>

<p>Jumlah Pegawai</p>

<h2 id="jumlah">0</h2>

</div>

<div class="card">

<i class="fa-solid fa-circle-check"></i>

<p>Lengkap</p>

<h2 id="lengkap">0</h2>

</div>

<div class="card">

<i class="fa-solid fa-circle-xmark"></i>

<p>Belum Lengkap</p>

<h2 id="belum">0</h2>

</div>

<div class="card">

<i class="fa-solid fa-chart-line"></i>

<p>Peratus Siap</p>

<h2 id="peratus">0%</h2>

</div>


<h2 style="margin-bottom:15px;">Ringkasan Mengikut Jabatan</h2>

<div id="departmentCards"
style="
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
margin-bottom:30px;
">

</div>
    
<h2 style="margin-bottom:15px;">Senarai Pegawai</h2>

<table style="width:100%;background:white;border-collapse:collapse;box-shadow:0 5px 15px rgba(0,0,0,.08);">

<thead>

<tr style="background:#0B5ED7;color:white;">

<th style="padding:12px;">Nama</th>
<th>Jawatan</th>
<th>Jabatan</th>
<th>Status</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>


<script>
const API_URL="https://script.google.com/macros/s/AKfycby18A9luLxRnX0yWmvVKRlz_wwgHff-BcoeQeDcbeNXvD5zGRKWbI2xpa2fhPlmGsaKAg/exec";
let allData=[];

function renderTable(rows){
 let html="";
 rows.forEach(item=>{
   const status=item.sijil?"Lengkap":"Belum";
   html+=`<tr>
<td style="padding:10px">${item.nama}</td>
<td>${item.jawatan}</td>
<td>${item.jabatan}</td>
<td style="color:${status==="Lengkap"?"green":"red"};font-weight:bold">${status}</td>
</tr>`;
 });
 document.getElementById("tableBody").innerHTML=html;
}

function showDepartment(jabatan){
 renderTable(allData.filter(x=>x.jabatan===jabatan));
}

fetch(API_URL)
.then(r=>r.json())
.then(data=>{
 const seen=new Set();
 allData=data.filter(item=>{
   const key=String(item.ic).replace(/-/g,"").replace(/\s/g,"").trim();
   if(seen.has(key)) return false;
   seen.add(key);
   return true;
 });

 let lengkap=0;
 const jabatanCount={};

 allData.forEach(item=>{
   if(item.sijil) lengkap++;
   const j=item.jabatan||"TIADA JABATAN";
   jabatanCount[j]=(jabatanCount[j]||0)+1;
 });

 document.getElementById("jumlah").textContent=allData.length;
 document.getElementById("lengkap").textContent=lengkap;
 document.getElementById("belum").textContent=allData.length-lengkap;
 document.getElementById("peratus").textContent=((lengkap/allData.length)*100).toFixed(1)+"%";
 document.getElementById("lastUpdate").textContent="Kemaskini : "+new Date().toLocaleString("ms-MY");

 renderTable(allData);

 const wrap=document.getElementById("departmentCards");
 wrap.innerHTML="";

 Object.entries(jabatanCount).sort((a,b)=>b[1]-a[1]).forEach(([jabatan,bil])=>{
   const card=document.createElement("div");
   card.className="dept-card";
   card.style.cssText=`
background:linear-gradient(135deg,#ffffff,#f8fbff);
border-radius:20px;
padding:22px;
cursor:pointer;
border:1px solid #dce8ff;
box-shadow:0 12px 30px rgba(0,0,0,.08);
transition:all .3s ease;
position:relative;
overflow:hidden;
`;card.innerHTML=`

<div style="display:flex;justify-content:space-between;align-items:center;">

<div>

<div style="
font-size:13px;
color:#6c757d;
font-weight:600;
letter-spacing:.5px;
">
JABATAN
</div>

<div style="
font-size:18px;
font-weight:700;
margin-top:6px;
color:#212529;
">
${jabatan}
</div>

</div>

<div style="
width:60px;
height:60px;
border-radius:18px;
background:#eaf2ff;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
">
🏥
</div>

</div>

<div style="
margin-top:22px;
display:flex;
justify-content:space-between;
align-items:end;
">

<div>

<div style="font-size:34px;font-weight:700;color:#0B5ED7;">
${bil}
</div>

<div style="font-size:13px;color:#888;">
Pegawai telah menghantar
</div>

</div>

<div style="
color:#0B5ED7;
font-weight:600;
font-size:14px;
">
Lihat →
</div>

</div>

`;
   <p style="font-size:28px;font-weight:bold;color:#0B5ED7;">👥 ${bil}</p>
   <small>Klik untuk lihat senarai pegawai</small>`;
   card.addEventListener("click",()=>showDepartment(jabatan));
   wrap.appendChild(card);
 });
})
.catch(err=>{
 console.error(err);
 alert("Ralat memuatkan data.");
});
</script>


</body>

</html>
